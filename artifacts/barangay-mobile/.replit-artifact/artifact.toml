kind = "mobile"
previewPath = "/mobile/"
title = "Barangay Santiago Mobile App"
version = "1.0.0"
id = "artifacts/barangay-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25758

[services.development]
run = "pnpm --filter @workspace/barangay-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barangay-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/barangay-mobile", "run", "serve" ]

[services.env]
PORT = "25758"
BASE_PATH = "/mobile/"
